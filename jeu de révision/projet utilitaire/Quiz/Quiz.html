<!DOCTYPE html>
<html lang="fr">
<head>

    <title>Quiz LanguageLearning</title>

</head>
<body>
    <script>
        fetch('translation.csv')
            .then(response => response.text())
            .then(data => {
                const lines = data.split('\n');
                const list_fr = [];
                const list_ang = [];
                const list_esp = [];
                const list_all = [];

                lines.forEach(line => {
                    const colonnes= line.split(';');
                    if (colonnes.length >= 4) {
                        french_list.push(colonnes[0]);
                        english_list.push(colonnes[1]);
                        spanish_list.push(colonnes[2]);
                        german_list.push(colonnes[3]);
                    }
                });
            })
    </script>
    <div class='description'>Mode de jeu sous forme de quiz~</div> <!-- Bloc sous-titre -->

                </select>
 
            <br> La langue d'entrainement </br>
                <select id="entrainement" onchange="selentrainement()">

        </tr>

        </table>
    </div>

</html>
